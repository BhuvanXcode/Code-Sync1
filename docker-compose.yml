services:
  server:
    container_name: code-sync-server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"

  client:
    container_name: code-sync-client
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - server
